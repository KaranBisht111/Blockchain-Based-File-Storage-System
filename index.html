<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blockchain-Based File Storage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      color: #fff !important; /* all text white */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      border-radius: 1rem;
      background: #2c2c54;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      color: #fff !important;
    }
    .gradient-header {
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      color: #fff !important;
      border-radius: 1rem 1rem 0 0;
      padding: 1.2rem;
      text-align: center;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: 1px;
    }
    .file-link {
      word-break: break-all;
      color: #fff !important;
    }
    label, h5, p, strong {
      color: #fff !important;
    }
    .btn-connect, .btn-primary {
      font-weight: 600;
    }
    #connectionStatus, #status {
      font-weight: 600;
      color: #fff !important;
    }
    .alert {
      background-color: rgba(255, 255, 255, 0.15) !important;
      border: none;
      color: #fff !important;
    }
    input.form-control {
      background-color: #444a76;
      color: #fff;
      border: 1px solid #5a62a1;
    }
    input.form-control:focus {
      background-color: #545d8e;
      color: #fff;
      border-color: #6a11cb;
      box-shadow: 0 0 8px #6a11cb;
    }
        /* Container wrapping the uploaded files list and heading */
    .uploaded-files-section {
      background-color: #2563eb; /* blue background similar to success alert */
      border-radius: 0.5rem;
      padding: 1rem 1.5rem;
      margin-top: 1.5rem;
      color: #fff !important;
    }

    /* The actual list */
    .uploaded-files-section #fileList {
      background-color: transparent; /* transparent to inherit container bg */
      max-height: 300px;
      overflow-y: auto;
      padding-left: 0;
      margin-top: 0.75rem;
    }

    /* Each list item style */
    .uploaded-files-section #fileList .list-group-item {
      background-color: rgba(255, 255, 255, 0.15); /* translucent white */
      color: #fff !important;
      border: none;
      margin-bottom: 0.5rem;
      border-radius: 0.3rem;
      font-weight: 600;
    }

    /* Links inside list items */
    .uploaded-files-section #fileList .list-group-item a {
      color: #bfdbfe; /* lighter blue */
      text-decoration: underline;
    }

    .uploaded-files-section #fileList .list-group-item a:hover {
      color: #93c5fd; /* even lighter on hover */
    }

  </style>
</head>
<body>

<div class="container py-5">
  <div class="card shadow-lg mx-auto" style="max-width: 600px;">
    <div class="gradient-header">
      📦 Blockchain-Based File Storage
    </div>
    <div class="p-4">
      
      <button id="connectBtn" class="btn btn-outline-light btn-connect w-100">Connect MetaMask</button>

      <div class="mb-3">
        <label class="form-label fw-bold">Select File:</label>
        <input class="form-control" type="file" id="fileInput" />
      </div>

      <button class="btn btn-primary w-100" onclick="uploadFile()">🚀 Upload & Store</button>

      <div id="connectionStatus" class="alert mt-3 d-none"></div>
      <div id="status" class="alert mt-3 d-none"></div>

      <div class="uploaded-files-section">
        <h5>📄 Uploaded Files:</h5>
        <ul id="fileList" class="list-group mt-2"></ul>
      </div>

    </div>
  </div>
</div>

<script>
  const PINATA_JWT = "......"; // Replace with your Pinata JWT
  const CONTRACT_ADDRESS = "......"; // Replace with deployed contract address
  const CONTRACT_ABI = ...; // Paste your ABI array here

  let web3;
  let contract;
  let currentAccount = null;

  const connectBtn = document.getElementById("connectBtn");
  const connectionStatus = document.getElementById("connectionStatus");

  async function connectMetaMask() {
    if (!window.ethereum) {
      showConnectionStatus("❌ MetaMask not installed!", "danger");
      return;
    }
    try {
      web3 = new Web3(window.ethereum);
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      currentAccount = accounts[0];
      contract = new web3.eth.Contract(CONTRACT_ABI, CONTRACT_ADDRESS);
      connectBtn.textContent = "Disconnect MetaMask";
      showConnectionStatus(`🟢 Connected: ${currentAccount}`, "success");
    } catch (error) {
      showConnectionStatus("⚠️ Connection to MetaMask rejected", "warning");
    }
  }

  function disconnectMetaMask() {
    currentAccount = null;
    contract = null;
    web3 = null;
    connectBtn.textContent = "Connect MetaMask";
    showConnectionStatus("⚪️ Disconnected from MetaMask", "secondary");
  }

  connectBtn.onclick = () => {
    if (currentAccount) {
      disconnectMetaMask();
    } else {
      connectMetaMask();
    }
  };

  // Listen for account changes
  if (window.ethereum) {
    window.ethereum.on('accountsChanged', (accounts) => {
      if (accounts.length === 0) {
        disconnectMetaMask();
      } else {
        currentAccount = accounts[0];
        showConnectionStatus(`🟢 Account changed: ${currentAccount}`, "info");
        connectBtn.textContent = "Disconnect MetaMask";
      }
    });
  }

  async function uploadFile() {
    if (!currentAccount) {
      showStatus("⚠️ Please connect MetaMask first!", "warning");
      return;
    }

    const file = document.getElementById('fileInput').files[0];
    if (!file) {
      showStatus("Please select a file first!", "danger");
      return;
    }

    showStatus("Uploading to Pinata...", "info");

    try {
      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
        method: "POST",
        headers: {
          Authorization: `Bearer ${PINATA_JWT}`,
        },
        body: formData,
      });

      const data = await res.json();
      if (!data.IpfsHash) throw new Error("Upload failed");

      const cid = data.IpfsHash;
      showStatus(`✅ Uploaded to IPFS: ${cid}`, "success");

      await contract.methods.registerFile(cid, file.name).send({ from: currentAccount });

      addFileToList(cid, file.name);

    } catch (error) {
      console.error(error);
      showStatus("❌ Upload failed: " + error.message, "danger");
    }
  }

  function addFileToList(cid, filename) {
    const fileList = document.getElementById("fileList");
    const link = `https://gateway.pinata.cloud/ipfs/${cid}`;
    const li = document.createElement("li");
    li.className = "list-group-item file-link";
    li.innerHTML = `<strong>${filename}</strong> - <a href="${link}" target="_blank" rel="noopener">${cid}</a>`;
    fileList.appendChild(li);
  }

  function showStatus(message, type) {
    const statusDiv = document.getElementById("status");
    statusDiv.className = `alert alert-${type}`;
    statusDiv.textContent = message;
    statusDiv.classList.remove("d-none");
  }

  function showConnectionStatus(message, type) {
    connectionStatus.className = `alert alert-${type}`;
    connectionStatus.textContent = message;
    connectionStatus.classList.remove("d-none");
  }

  // Initialize with no connection
  showConnectionStatus("⚪️ Not connected to MetaMask", "secondary");

</script>

</body>
</html>
